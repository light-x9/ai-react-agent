# ============================================
# Nginx 配置: ai-react-agent
# 监听端口: 8081
# 用途: 新项目的静态前端 + 反向代理后端
# ============================================
#
# 部署方法:
#   sudo cp nginx-ai-react-agent.conf /etc/nginx/sites-available/ai-react-agent
#   sudo ln -s /etc/nginx/sites-available/ai-react-agent /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 8081;
    server_name _;  # 接受任何域名/IP

    # ---- 前端静态文件 ----
    root /var/www/ai-react-agent;
    index index.html;

    # 安全响应头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 静态资源缓存（hash 过的文件名可以长期缓存）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API 反向代理到后端（SSE 需要关闭缓冲）
    location /api/ {
        proxy_pass http://127.0.0.1:8123/api/;
        proxy_http_version 1.1;

        # 请求头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 关键配置：禁用缓冲
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;

        # 超时设置：SSE 流可能持续数分钟
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # 请求体大小（与后端 multipart 配置一致）
        client_max_body_size 11m;
    }

    # 文件下载
    location /files/ {
        proxy_pass http://127.0.0.1:8123/files/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 前端路由（Vue SPA history mode）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
