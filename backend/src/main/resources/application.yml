spring:
  application:
    name: react-agent
  autoconfigure:
    exclude:
      - org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaEmbeddingAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeChatAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAgentAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAudioSpeechAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAudioTranscriptionAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeEmbeddingAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeImageAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeRerankAutoConfiguration
  profiles:
    active: local
  ai:
    dashscope:
      chat:
        options:
          model: qwen3-32b
    openai:
      api-key: ${DEEPSEEK_API_KEY:}
      chat:
        options:
          model: deepseek-chat
      base-url: https://api.deepseek.com
    ollama:
      base-url: http://localhost:11434
      chat:
        model: gemma3:1b
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB

  # Tomcat 鍏ㄥ眬璇锋眰浣撳ぇ灏忛檺鍒讹紙闈?multipart 鐨?POST/PUT 璇锋眰锛岄槻姝㈠唴瀛?DoS锛?
  tomcat:
    max-http-form-post-size: 1MB

server:
  port: 8123
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      force: true
# springdoc-openapi config
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.light.reactagent.controller
# knife4j config
knife4j:
  enable: true
  setting:
    language: zh_cn

# 淇敼鏃ュ織绾у埆锛屾煡鐪?Spring AI 鏇村璋冪敤缁嗚妭
logging:
  level:
    org.springframework.ai: DEBUG

# LightManus 宸ュ叿瀹夊叏閰嶇疆
lightmanus:
  tool:
    terminal:
      # 缁堢宸ュ叿寮€鍏筹細鍏綉鐜蹇呴』鍏抽棴锛圠LM 鍙墽琛?shell锛岄粦鍚嶅崟鍙缁曡繃锛?
      # 浠呭湪鍙楁帶鍐呯綉鍦烘櫙鎴栨湰鍦板紑鍙戞椂璁句负 true
      enabled: false
  quota:
    # 姣忕敤鎴锋瘡鏃ュ璇濅笂闄?
    daily-chat: 100
    # 姣忕敤鎴锋瘡鏃ヨ仈缃戞悳绱笂闄?
    daily-web-search: 30

# CORS 閰嶇疆锛堥€楀彿鍒嗛殧鐨勫煙鍚嶅垪琛紝"*" 琛ㄧず鍏佽鎵€鏈夛級
cors:
  allowed-origins: "*"

# JWT 璁よ瘉閰嶇疆
jwt:
  # HS256 瀵嗛挜 鈥斺€?鐢熶骇鐜蹇呴』閫氳繃鐜鍙橀噺 JWT_SECRET 瑕嗙洊锛?
  # 鐢熸垚鏂瑰紡锛歰penssl rand -base64 48
  # 榛樿 fallback 浠呯敤浜庢湰鍦板紑鍙戯紙鍏綉浣跨敤榛樿鍊肩瓑浜庤８濂旓級
  secret: ${JWT_SECRET:jwt-dev-secret-key-change-in-production-please-use-random-32bytes}
  # token 鏈夋晥鏈燂紙姣锛夛紝榛樿 24 灏忔椂
  expiration: 86400000
