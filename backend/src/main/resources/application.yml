spring:
  application:
    name: react-agent
  autoconfigure:
    exclude:
      - org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaEmbeddingAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeChatAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAgentAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAudioSpeechAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAudioTranscriptionAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeImageAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeRerankAutoConfiguration
  profiles:
    active: local
  ai:
    dashscope:
      chat:
        options:
          model: qwen3-32b
    openai:
      api-key: ${DEEPSEEK_API_KEY:}
      chat:
        options:
          model: deepseek-chat
      base-url: https://api.deepseek.com
    ollama:
      base-url: http://localhost:11434
      chat:
        model: gemma3:1b
  # 多模型路由：未配置时走 spring.ai 默认 ChatModel 兜底
  #router:
  #  health:
  #    failure-threshold: 3        # 连续失败 3 次开熔断
  #    reset-timeout-ms: 120000    # 120s 后半开试探
  #    check-interval-ms: 30000
  #    enabled: true
  #  models:
  #    - name: deepseek
  #      primary: true
  #      model-id: deepseek-chat
  #      provider: openai
  #      cost-weight: 1.0
  #    - name: qwen
  #      model-id: qwen3-32b
  #      provider: openai         # 通义若走 OpenAI 兼容网关则用此
  #      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
  #      cost-weight: 0.8
  #    - name: ollama
  #      model-id: gemma3:1b
  #      provider: ollama
  #      cost-weight: 0.1
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB

  # Tomcat 全局请求体大小限制（非 multipart 的 POST/PUT 请求，防止内存 DoS）
  tomcat:
    max-http-form-post-size: 1MB

server:
  port: 9123  # 8123 被 Windows Hyper-V 动态端口排除范围(8026-8125)占用，改用 9123
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      force: true
# springdoc-openapi config
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.light.reactagent.controller
# knife4j config
knife4j:
  enable: true
  setting:
    language: zh_cn

# 修改日志级别，查看 Spring AI 更多调用细节
logging:
  level:
    org.springframework.ai: DEBUG

# LightManus 工具安全配置
lightmanus:
  tool:
    terminal:
      # 终端工具开关：公网环境必须关闭（LLM 可执行 shell，黑名单可被绕过）
      # 仅在受控内网场景或本地开发时设为 true
      enabled: false
  quota:
    # 每用户每日对话上限
    daily-chat: 100
    # 每用户每日联网搜索上限
    daily-web-search: 30
  file:
    # 单文件大小上限（MB）：防止 Agent 生成超大文件撑爆磁盘
    max-size-mb: 50
    # 单会话累计生成文件大小上限（MB）：防止 Agent ReAct 循环写爆磁盘
    max-total-per-chat-mb: 500

# CORS 配置（逗号分隔的域名列表，"*" 表示允许所有）
cors:
  allowed-origins: "*"

# JWT 认证配置
jwt:
  # HS256 密钥 —— 生产环境必须通过环境变量 JWT_SECRET 覆盖！
  # 生成方式：openssl rand -base64 48
  # 默认 fallback 仅用于本地开发（公网使用默认值等于裸奔）
  secret: ${JWT_SECRET:jwt-dev-secret-key-change-in-production-please-use-random-32bytes}
  # token 有效期（毫秒），默认 24 小时
  expiration: 86400000
