spring:
  application:
    name: react-agent
  profiles:
    active: local
  ai:
    dashscope:
      chat:
        options:
          model: qwen-turbo
    ollama:
      base-url: http://localhost:11434
      chat:
        model: gemma3:1b
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8123
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      force: true
# springdoc-openapi config
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.light.reactagent.controller
# knife4j config
knife4j:
  enable: true
  setting:
    language: zh_cn

# 修改日志级别，查看 Spring AI 更多调用细节
logging:
  level:
    org.springframework.ai: DEBUG

# LightManus 工具安全配置
lightmanus:
  tool:
    terminal:
      # 终端工具开关：默认开启以保持 Agent 命令执行能力
      # 生产环境强烈建议设为 false，或仅在受控内网场景开启
      enabled: true

# JWT 认证配置
jwt:
  # HS256 密钥，生产环境务必通过环境变量 JWT_SECRET 覆盖，至少 32 字节
  secret: ${JWT_SECRET:dev-secret-key-please-change-in-production-at-least-32-bytes-long}
  # token 有效期（毫秒），默认 24 小时
  expiration: 86400000
