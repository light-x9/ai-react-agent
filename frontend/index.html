<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="description" content="LightManus 多工具 AI 智能体平台，提供 AI 对话、知识库、工具调用等一站式智能体服务" />
    <meta name="keywords" content="AI智能体,AI助手,智能对话,ReAct,MCP,RAG,知识库" />
    <meta name="author" content="LightManus" />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="LightManus-多工具AI智能体平台" />
    <meta property="og:description" content="为您提供智能化的 AI 对话服务，支持工具调用、知识库检索与多轮推理" />
    <meta property="og:type" content="website" />
    <title>LightManus-多工具AI智能体平台</title>
    <!--
      字体策略：
      - 站点头图/英文标题使用 Inter（通过 Google Fonts 加载）
      - 中文正文始终回落到系统字体栈（PingFang SC → Microsoft YaHei）
      - 严禁在任何中文内容节点独用纯西文字体（如 Orbitron）
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <!-- 主题预热：在首屏绘制前根据 localStorage 应用深色/浅色，避免闪烁 -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('lightmanus-theme');
          if (t === 'dark' || t === 'light') {
            document.documentElement.setAttribute('data-theme', t);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    <!-- ECharts：对话图表渲染（按需加载，仅对话页用到） -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  </body>
</html>
